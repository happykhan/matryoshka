[workspace]
name = "matryoshka"
version = "0.1.0"
description = "Nested MGE detection and annotation for complete bacterial genomes"
channels = ["conda-forge", "bioconda"]
platforms = ["linux-64"]

[tasks]
run = "python -m matryoshka"
test = "pytest tests/"
fetch-refs = "python scripts/fetch_references.py"

[dependencies]
# Core: Python 3.11+ for main code (wolvercote needs >=3.10)
python = ">=3.11"
biopython = ">=1.83"
pandas = ">=2.0"
pyyaml = ">=6.0"
click = ">=8.1"
pytest = ">=8.0"
requests = ">=2.28"
matplotlib = ">=3.8"
blast = ">=2.15"

[pypi-dependencies]
wolvercote = { path = "../cell-format/python", editable = true }
matryoshka = { path = ".", editable = true }

# ── Detection tool environments ──────────────────────────────────────────────
# Each runs as a subprocess; they live in isolated environments.
# wolvercote NOT included — these only need the tool executables.

[feature.isescan.dependencies]
python = ">=3.9"
isescan = ">=1.7.2"

[feature.integron.dependencies]
python = ">=3.9,<=3.10"
biopython = "==1.78"
integron_finder = ">=2.0"

[feature.amrfinder.dependencies]
ncbi-amrfinderplus = ">=4.0"

[feature.mobsuite.dependencies]
python = ">=3.9,<=3.10"
mob_suite = ">=3.1"

[environments]
default = { features = [], solve-group = "default" }
isescan = { features = ["isescan"], no-default-feature = true, solve-group = "isescan" }
integron = { features = ["integron"], no-default-feature = true, solve-group = "integron" }
amrfinder = { features = ["amrfinder"], no-default-feature = true, solve-group = "amrfinder" }
mobsuite = { features = ["mobsuite"], no-default-feature = true, solve-group = "mobsuite" }
