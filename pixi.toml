[project]
name = "matryoshka"
version = "0.1.0"
description = "Nested MGE detection and annotation for complete bacterial genomes"
channels = ["conda-forge", "bioconda"]
platforms = ["linux-64"]

[tasks]
run = "python -m matryoshka"
test = "pytest tests/"

[dependencies]
python = ">=3.11"
biopython = ">=1.83"
pandas = ">=2.0"
pyyaml = ">=6.0"
click = ">=8.1"
pytest = ">=8.0"

[pypi-dependencies]
wolvercote = { path = "../cell-format/python", editable = true }

# Detection tools
isescan = ">=1.7.2"
integron_finder = ">=2.0"
mob-suite = ">=3.1"
ncbi-amrfinderplus = ">=4.0"
